backend:
  name: github
  repo: Klasthorsen/TVM-website
  branch: main
  auth_type: pkce
  app_id: Iv23liqeFBQG8zr1w6gs
  cms_label_prefix: decap-cms/

media_folder: public/images
public_folder: /images

site_url: https://tvm-website-topaz.vercel.app
display_url: https://tvm-website-topaz.vercel.app

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/home.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string", default: "Browse everything." }
              - { label: "Hero Image", name: "heroImage", widget: "image", required: true }

          - label: "Logo Cloud"
            name: "logoCloud"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string", default: "Trusted by:" }
              - label: "Logos"
                name: "logos"
                widget: "list"
                fields:
                  - { label: "Logo Image", name: "image", widget: "image" }
                  - { label: "Alt Text", name: "alt", widget: "string" }

          - label: "Benefits Section"
            name: "benefits"
            widget: "object"
            fields:
              - { label: "Section Label", name: "label", widget: "string", default: "Benefits" }
              - { label: "Headline", name: "headline", widget: "string", default: "We've cracked the code." }
              - { label: "Subheadline", name: "subheadline", widget: "string" }
              - { label: "Section Image", name: "image", widget: "image" }
              - label: "Benefits List"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Icon", name: "icon", widget: "select", options: ["cable", "earth", "account", "chart"] }

          - label: "Features Section"
            name: "features"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string", default: "See the Big Picture" }
              - { label: "Subheadline", name: "subheadline", widget: "text" }
              - { label: "Feature Image", name: "image", widget: "image" }
              - label: "Feature List"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Text", name: "text", widget: "string" }

          - label: "Specifications Section"
            name: "specifications"
            widget: "object"
            fields:
              - { label: "Section Label", name: "label", widget: "string", default: "Specs" }
              - { label: "Headline", name: "headline", widget: "string", default: "Why Choose Area?" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Testimonial"
            name: "testimonial"
            widget: "object"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Author Name", name: "authorName", widget: "string" }
              - { label: "Author Title", name: "authorTitle", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }

          - label: "How It Works"
            name: "howItWorks"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string", default: "Map Your Success" }
              - label: "Steps"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          - label: "Hero Image Section"
            name: "heroImageSection"
            widget: "object"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }

          - label: "CTA Section"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string", default: "Connect with us" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Button Text", name: "buttonText", widget: "string", default: "Learn More" }
